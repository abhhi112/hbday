<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Animated Background Stars/Balloons */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .balloon {
            position: absolute;
            font-size: 20px;
            animation: float 6s ease-in-out infinite;
        }
        
        .balloon:nth-child(1) { left: 10%; animation-delay: 0s; color: #ff6b6b; }
        .balloon:nth-child(2) { left: 20%; animation-delay: 1s; color: #4ecdc4; }
        .balloon:nth-child(3) { left: 30%; animation-delay: 2s; color: #45b7d1; }
        .balloon:nth-child(4) { left: 40%; animation-delay: 3s; color: #f9ca24; }
        .balloon:nth-child(5) { left: 50%; animation-delay: 4s; color: #6c5ce7; }
        .balloon:nth-child(6) { left: 60%; animation-delay: 1.5s; color: #fd79a8; }
        .balloon:nth-child(7) { left: 70%; animation-delay: 2.5s; color: #00b894; }
        .balloon:nth-child(8) { left: 80%; animation-delay: 0.5s; color: #e17055; }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .birthday-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .name-section {
            margin: 30px 0;
        }
        
        .person-name {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .age {
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: #00b894;
            font-weight: 600;
        }
        
        .message {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            line-height: 1.6;
            color: #2d3436;
            max-width: 600px;
            margin: 40px auto;
            font-weight: 300;
        }
        
        .cake-container {
            margin: 50px 0;
            position: relative;
        }
        
        .cake {
            font-size: clamp(4rem, 12vw, 8rem);
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        
        .candles {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }
        
        .candle {
            width: 8px;
            height: 30px;
            background: linear-gradient(to top, #ffeaa7, #fdcb6e);
            border-radius: 4px 4px 0 0;
            position: relative;
        }
        
        .flame {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ffed4a, #f39c12);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes flicker {
            0% { transform: translateX(-50%) translateY(0) scale(1); }
            100% { transform: translateX(-50%) translateY(-2px) scale(1.1); }
        }
        
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255,107,107,0.4);
        }
        
        @media (max-width: 768px) {
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation" id="balloons">
        <div class="balloon">🎈</div>
        <div class="balloon">🎉</div>
        <div class="balloon">🎈</div>
        <div class="balloon">🎊</div>
        <div class="balloon">🎈</div>
        <div class="balloon">✨</div>
        <div class="balloon">🎈</div>
        <div class="balloon">⭐</div>
    </div>
    
    <div class="container">
        <h1 class="birthday-title">Happy Birthday!</h1>
        
        <div class="name-section">
            <div class="person-name" id="personName">Special Person</div>
            <div class="age">You're Another Year Awesome! 🎂</div>
        </div>
        
        <p class="message">
            Wishing you a day filled with love, laughter, and all your favorite things! 
            May this year bring you endless joy, amazing adventures, and beautiful memories.
            Always keep smiling and laughing.🥳✨
        </p>
        
        <div class="cake-container">
            <div class="candles">
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
            </div>
            <div class="cake">🎂</div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="blowCandles()">Blow Candles 🎂</button>
        </div>
    </div>
    
    <script>
       
        const personName = "SIMRAN "; // Change this to the birthday person's name
        document.getElementById('personName').textContent = personName;
        
        // Blow out candles
        function blowCandles() {
            const flames = document.querySelectorAll('.flame');
            flames.forEach((flame, index) => {
                setTimeout(() => {
                    flame.style.opacity = '0';
                    flame.style.transform = 'translateX(-50%) translateY(-5px) scale(0.5)';
                }, index * 100);
            });
            
            setTimeout(() => {
                alert(`Happy Birthday ${personName}! 🎉 The candles are out!`);
                // Reset candles
                setTimeout(() => {
                    flames.forEach(flame => {
                        flame.style.opacity = '1';
                        flame.style.transform = 'translateX(-50%) translateY(0) scale(1)';
                    });
                }, 1000);
            }, 800);
        }
        
        // Continuous balloon animation
        function spawnBalloon() {
            const balloons = document.getElementById('balloons');
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.innerHTML = ['🎈','🎉','🎊','✨','⭐'][Math.floor(Math.random()*5)];
            balloon.style.left = Math.random() * 100 + '%';
            balloon.style.animationDelay = Math.random() * 3 + 's';
            balloons.appendChild(balloon);
            
            setTimeout(() => {
                balloon.remove();
            }, 7000);
        }
        
        setInterval(spawnBalloon, 800);
    </script>
</body>
</html>
